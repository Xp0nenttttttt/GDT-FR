  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0a0a0f;
      --bg2: #111118;
      --bg3: #18181f;
      --bd: #222230;
      --bd2: #2a2a3a;
      --tx: #e8e8f0;
      --mu: #555570;
      --mu2: #8888a0;
      --or: #ff6b00;
      --yl: #ffd60a;
      --bl: #3b82f6;
      --gr: #22c55e;
      --rd: #ef4444;
      --pu: #a855f7;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--tx);
      font-family: 'Inter', sans-serif;
      font-size: 14px
    }

    /* Layout */
    .layout {
      display: flex;
      min-height: 100vh
    }

    .sidebar {
      width: 210px;
      background: var(--bg2);
      border-right: 1px solid var(--bd);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto
    }

    .main {
      flex: 1;
      padding: 28px 32px;
      max-width: 920px;
      min-width: 0
    }

    /* Sidebar */
    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 900;
      color: var(--or);
      letter-spacing: 2px;
      padding: 0 20px 2px
    }

    .logo-sub {
      font-size: 9px;
      color: var(--mu);
      letter-spacing: 1.5px;
      padding: 0 20px 22px;
      font-family: 'Orbitron', monospace
    }

    .nav-section {
      font-size: 9px;
      color: var(--mu);
      letter-spacing: 2px;
      padding: 0 20px 6px;
      margin-top: 6px
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--mu2);
      cursor: pointer;
      transition: all .15s;
      border-left: 2px solid transparent;
      user-select: none
    }

    .nav-item:hover {
      color: var(--tx);
      background: var(--bg3)
    }

    .nav-item.active {
      color: var(--or);
      border-left-color: var(--or);
      background: rgba(255, 107, 0, .06)
    }

    .nav-item .icon {
      font-size: 15px;
      width: 20px;
      text-align: center
    }

    .sidebar-foot {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid var(--bd)
    }

    .user-info {
      font-size: 11px;
      color: var(--mu2);
      margin-bottom: 8px
    }

    .user-info strong {
      color: var(--or);
      display: block;
      font-size: 12px;
      margin-bottom: 2px
    }

    /* Buttons */
    .btn {
      background: transparent;
      border: 1.5px solid var(--or);
      color: var(--or);
      padding: 7px 16px;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s
    }

    .btn:hover {
      background: var(--or);
      color: #000
    }

    .btn.bl {
      border-color: var(--bl);
      color: var(--bl)
    }

    .btn.bl:hover {
      background: var(--bl);
      color: #000
    }

    .btn.gr {
      border-color: var(--gr);
      color: var(--gr)
    }

    .btn.gr:hover {
      background: var(--gr);
      color: #000
    }

    .btn.rd {
      border-color: var(--rd);
      color: var(--rd)
    }

    .btn.rd:hover {
      background: var(--rd);
      color: #000
    }

    .btn.pu {
      border-color: var(--pu);
      color: var(--pu)
    }

    .btn.pu:hover {
      background: var(--pu);
      color: #000
    }

    .btn.sm {
      padding: 4px 10px;
      font-size: 11px
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px
    }

    /* Page */
    .page-title {
      font-family: 'Orbitron', monospace;
      font-size: 17px;
      font-weight: 900;
      color: var(--tx);
      margin-bottom: 4px
    }

    .page-sub {
      font-size: 12px;
      color: var(--mu2);
      margin-bottom: 24px
    }

    .section {
      margin-bottom: 28px
    }

    .stitle {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--mu);
      margin-bottom: 12px
    }

    /* Cards */
    .card {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: 10px;
      overflow: hidden
    }

    .card-head {
      padding: 11px 16px;
      border-bottom: 1px solid var(--bd);
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .card-head-title {
      font-family: 'Orbitron', monospace;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--mu2)
    }

    /* Summary */
    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 24px
    }

    .sum-card {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: 10px;
      padding: 14px 16px
    }

    .sum-val {
      font-family: 'Orbitron', monospace;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px
    }

    .sum-lbl {
      font-size: 10px;
      color: var(--mu);
      letter-spacing: .5px
    }

    /* Tables */
    .lb-table {
      width: 100%;
      border-collapse: collapse
    }

    .lb-table th {
      font-size: 10px;
      font-weight: 500;
      color: var(--mu);
      letter-spacing: .5px;
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--bd)
    }

    .lb-table td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--bd);
      transition: background .1s
    }

    .lb-table tr:last-child td {
      border-bottom: none
    }

    .lb-table tr:hover td {
      background: var(--bg3)
    }

    .lb-table th.r,
    .lb-table td.r {
      text-align: right
    }

    .rank {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--mu)
    }

    .rank.r1 {
      color: var(--yl)
    }

    .rank.r2 {
      color: #b0b8c8
    }

    .rank.r3 {
      color: #cd7c3a
    }

    .team-cell {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px
    }

    .team-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .pts-cell {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--or)
    }

    .num-cell {
      font-size: 12px;
      color: var(--mu2);
      text-align: right
    }

    /* Flag display */
    .flag {
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0
    }

    .flag.img {
      width: 22px;
      height: 16px;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0
    }

    .flag-sm {
      font-size: 14px;
      line-height: 1
    }

    /* Player row */
    .player-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--bd);
      transition: background .1s
    }

    .player-row:last-child {
      border-bottom: none
    }

    .player-row:hover {
      background: var(--bg3)
    }

    .player-name {
      flex: 1;
      font-weight: 500;
      font-size: 14px
    }

    .role-badge {
      font-size: 9px;
      padding: 2px 7px;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: .5px;
      border: 1px solid
    }

    .role-captain {
      border-color: rgba(255, 214, 10, .4);
      color: var(--yl);
      background: rgba(255, 214, 10, .06)
    }

    .role-coach {
      border-color: rgba(168, 85, 247, .4);
      color: var(--pu);
      background: rgba(168, 85, 247, .06)
    }

    .role-player {
      border-color: var(--bd2);
      color: var(--mu2)
    }

    /* Tournament cards */
    .t-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px
    }

    .t-card {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: 10px;
      padding: 16px;
      cursor: pointer;
      transition: all .15s
    }

    .t-card:hover {
      border-color: var(--bd2);
      background: var(--bg3);
      transform: translateY(-1px)
    }

    .t-card.major {
      border-color: rgba(255, 107, 0, .3);
      background: linear-gradient(135deg, rgba(255, 107, 0, .04), var(--bg2))
    }

    .t-card.major:hover {
      background: linear-gradient(135deg, rgba(255, 107, 0, .08), var(--bg3))
    }

    .t-type {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 5px
    }

    .t-type-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%
    }

    .t-name {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--tx);
      margin-bottom: 4px
    }

    .t-card.major .t-name {
      font-size: 14px;
      color: var(--or)
    }

    .t-date {
      font-size: 11px;
      color: var(--mu2);
      margin-bottom: 10px
    }

    .t-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px
    }

    .t-pts-badge {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: var(--yl)
    }

    .t-winner {
      font-size: 11px;
      color: var(--mu2);
      margin-top: 6px
    }

    .t-winner strong {
      color: var(--tx)
    }

    /* Status */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
      border: 1px solid;
      letter-spacing: .3px
    }

    .status.done {
      border-color: rgba(34, 197, 94, .3);
      color: var(--gr);
      background: rgba(34, 197, 94, .06)
    }

    .status.live {
      border-color: rgba(255, 107, 0, .4);
      color: var(--or);
      background: rgba(255, 107, 0, .08)
    }

    .status.soon {
      border-color: rgba(59, 130, 246, .3);
      color: var(--bl);
      background: rgba(59, 130, 246, .06)
    }

    .live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--or);
      animation: pulse 1s infinite;
      display: inline-block
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .3
      }
    }

    /* Bracket */
    .bracket {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .match {
      background: var(--bg3);
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 11px 14px;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .match-round {
      font-size: 9px;
      color: var(--mu);
      letter-spacing: .5px;
      text-transform: uppercase;
      min-width: 70px
    }

    .match-teams {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px
    }

    .match-team {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px
    }

    .match-team .n {
      display: flex;
      align-items: center;
      gap: 7px;
      font-weight: 500
    }

    .match-team .s {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700
    }

    .match-team.winner .s {
      color: var(--gr)
    }

    .match-team.loser .n {
      color: var(--mu2)
    }

    .match-team.loser .s {
      color: var(--mu)
    }

    .match-sep {
      height: 1px;
      background: var(--bd);
      margin: 2px 0
    }

    .pts-badge {
      font-size: 9px;
      padding: 2px 8px;
      border-radius: 10px;
      background: rgba(255, 214, 10, .07);
      border: 1px solid rgba(255, 214, 10, .2);
      color: var(--yl);
      font-weight: 600;
      white-space: nowrap
    }

    /* Tournament Bracket Tree */
    .bracket-tree {
      display: flex;
      gap: 30px;
      overflow-x: auto;
      padding: 20px 0;
      position: relative
    }

    .bracket-round {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 220px;
      position: relative
    }

    .bracket-round-title {
      font-size: 10px;
      color: var(--mu);
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 15px;
      font-weight: 600
    }

    .bracket-match {
      position: relative;
      background: var(--bg3);
      border: 1px solid var(--bd);
      border-radius: 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .bracket-match.winner {
      border-color: var(--gr);
      background: rgba(34, 197, 94, .05)
    }

    .bracket-match::after {
      content: '';
      position: absolute;
      top: 50%;
      right: -30px;
      width: 30px;
      height: 1px;
      background: var(--bd);
      transform: translateY(-50%)
    }

    .bracket-round:last-child .bracket-match::after {
      display: none
    }

    /* Add vertical lines to connect matches within rounds */
    .bracket-round .bracket-match:not(:last-child)::before {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -10px;
      width: 1px;
      height: 10px;
      background: var(--bd);
      transform: translateX(-50%)
    }

    .bracket-team {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 4px
    }

    .bracket-team.winner {
      background: rgba(34, 197, 94, .1);
      color: var(--gr)
    }

    .bracket-team.loser {
      color: var(--mu2)
    }

    .bracket-team .name {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 500
    }

    .bracket-team .score {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700
    }

    /* Team detail */
    .team-hero {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 18px
    }

    .team-hero-flag {
      font-size: 44px;
      line-height: 1;
      width: 60px;
      text-align: center;
      flex-shrink: 0
    }

    .team-hero-flag img {
      width: 60px;
      height: 44px;
      object-fit: cover;
      border-radius: 6px
    }

    .team-hero-info {
      flex: 1
    }

    .team-hero-name {
      font-family: 'Orbitron', monospace;
      font-size: 20px;
      font-weight: 900;
      margin-bottom: 6px
    }

    .team-hero-desc {
      font-size: 13px;
      color: var(--mu2);
      line-height: 1.5
    }

    .team-hero-pts {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--or);
      margin-top: 6px
    }

    /* Admin */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .field label {
      font-size: 10px;
      color: var(--mu);
      letter-spacing: .5px
    }

    .field input,
    .field select,
    .field textarea {
      background: var(--bg3);
      border: 1px solid var(--bd);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--tx);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      outline: none;
      width: 100%
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: var(--bl)
    }

    .field select option {
      background: var(--bg2)
    }

    .field.full {
      grid-column: 1/-1
    }

    .field small {
      font-size: 10px;
      color: var(--mu);
      margin-top: 2px
    }

    .admin-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-bottom: 1px solid var(--bd);
      font-size: 13px;
      flex-wrap: wrap
    }

    .admin-row:last-child {
      border-bottom: none
    }

    .admin-row .n {
      flex: 1;
      font-weight: 500;
      min-width: 80px
    }

    .err {
      color: var(--rd);
      font-size: 12px;
      padding: 8px 10px;
      background: rgba(239, 68, 68, .07);
      border: 1px solid rgba(239, 68, 68, .2);
      border-radius: 6px;
      margin-top: 8px
    }

    /* Auth */
    .auth-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg)
    }

    .auth-box {
      background: var(--bg2);
      border: 1px solid var(--bd);
      border-radius: 14px;
      padding: 32px;
      width: 360px
    }

    .auth-title {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--or);
      margin-bottom: 4px;
      letter-spacing: 1px
    }

    .auth-sub {
      font-size: 12px;
      color: var(--mu2);
      margin-bottom: 24px
    }

    /* Detail */
    .detail-hdr {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 24px
    }

    .back {
      background: transparent;
      border: 1px solid var(--bd2);
      color: var(--mu2);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      white-space: nowrap
    }

    .back:hover {
      border-color: var(--or);
      color: var(--or)
    }

    .detail-title {
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--or);
      margin-bottom: 4px
    }

    .detail-meta {
      font-size: 12px;
      color: var(--mu2)
    }

    /* Clickable row */
    .clickable {
      cursor: pointer
    }

    .clickable:hover td {
      background: var(--bg3) !important
    }

    /* Mobile */
    @media(max-width:680px) {
      .layout {
        flex-direction: column
      }

      .sidebar {
        width: 100%;
        height: auto;
        position: static;
        flex-direction: row;
        flex-wrap: wrap;
        padding: 10px 12px;
        gap: 2px;
        border-right: none;
        border-bottom: 1px solid var(--bd)
      }

      .logo,
      .logo-sub,
      .nav-section,
      .sidebar-foot {
        display: none
      }

      .nav-item {
        padding: 7px 10px;
        border-left: none;
        border-radius: 6px;
        font-size: 12px
      }

      .nav-item.active {
        border-left: none;
        background: rgba(255, 107, 0, .12)
      }

      .main {
        padding: 14px 16px
      }

      .summary {
        grid-template-columns: 1fr 1fr
      }

      .t-grid {
        grid-template-columns: 1fr
      }

      .form-grid {
        grid-template-columns: 1fr
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <script>
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    let S = {
      view: 'home',
      prevView: 'home',
      detailId: null,     // tournament detail
      teamDetailId: null, // team detail
      user: null,
      teams: [], players: [], tournaments: [], matches: [],
      loading: true, error: ''
    };

    // ── Data ──────────────────────────────────────────────
    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      S.user = session?.user || null;
      await loadData();
      S.loading = false;
      render();
    }

    async function loadData() {
      const [r1, r2, r3, r4] = await Promise.all([
        sb.from('teams').select('*').order('name'),
        sb.from('players').select('*').order('pts', { ascending: false }),
        sb.from('tournaments').select('*').order('created_at'),
        sb.from('matches').select('*').order('created_at'),
      ]);
      S.teams = r1.data || [];
      S.players = r2.data || [];
      S.tournaments = r3.data || [];
      S.matches = r4.data || [];
    }

    // ── Points ────────────────────────────────────────────
    function computeTeamPoints() {
      const pts = {}, wins = {}, played = {};
      S.teams.forEach(t => { pts[t.id] = 0; wins[t.id] = 0; played[t.id] = 0; });
      S.matches.forEach(m => {
        if (!m.winner_id) return;
        pts[m.winner_id] = (pts[m.winner_id] || 0) + m.pts_win;
        wins[m.winner_id] = (wins[m.winner_id] || 0) + 1;
        const loser = m.winner_id === m.team1_id ? m.team2_id : m.team1_id;
        if (loser) pts[loser] = (pts[loser] || 0) + m.pts_lose;
        if (m.team1_id) played[m.team1_id] = (played[m.team1_id] || 0) + 1;
        if (m.team2_id) played[m.team2_id] = (played[m.team2_id] || 0) + 1;
      });
      return { pts, wins, played };
    }

    // ── Helpers ───────────────────────────────────────────
    function teamById(id) { return S.teams.find(t => t.id === id); }
    function matchesFor(tid) { return S.matches.filter(m => m.tournament_id === tid); }
    function playersOf(tid) { return S.players.filter(p => p.team_id === tid); }
    function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    // isUrl — detect if flag is an image URL
    function isUrl(s) { return s && (s.startsWith('http') || s.startsWith('/')); }

    function flagHtml(flag, cls = 'flag') {
      if (!flag) return `<span class="${cls}">🏳️</span>`;
      if (isUrl(flag)) return `<img class="${cls} img" src="${esc(flag)}" alt="flag">`;
      return `<span class="${cls}">${esc(flag)}</span>`;
    }

    function roleBadge(role) {
      if (role === 'captain') return `<span class="role-badge role-captain">CAPTAIN</span>`;
      if (role === 'coach') return `<span class="role-badge role-coach">COACH</span>`;
      return `<span class="role-badge role-player">JOUEUR</span>`;
    }

    // ── Render ────────────────────────────────────────────
    function render() {
      if (S.loading) {
        document.getElementById('app').innerHTML = `<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--mu2);font-family:'Orbitron',monospace;font-size:12px;letter-spacing:2px">CHARGEMENT...</div>`;
        return;
      }
      if (S.view === 'auth') { document.getElementById('app').innerHTML = buildAuth(); attachAuth(); return; }

      const { pts, wins, played } = computeTeamPoints();
      const sortedTeams = [...S.teams].sort((a, b) => (pts[b.id] || 0) - (pts[a.id] || 0));

      document.getElementById('app').innerHTML = `
    <div class="layout">
      <nav class="sidebar">
        <div class="logo">GD TOUR</div>
        <div class="logo-sub">SAISON 1 · 2025</div>
        <div class="nav-section">GÉNÉRAL</div>
        ${ni('home', '🏠', 'Accueil')}
        ${ni('teams', '🛡️', 'Équipes')}
        ${ni('players', '👤', 'Joueurs')}
        ${ni('tournaments', '🎮', 'Tournois')}
        <div class="nav-section">CLASSEMENTS</div>
        ${ni('ranking-teams', '🏆', 'Équipes')}
        ${ni('ranking-players', '⭐', 'Joueurs')}
        ${S.user ? `<div class="nav-section">ADMIN</div>${ni('admin', '⚙️', 'Administration')}` : ''}
        <div class="sidebar-foot">
          ${S.user
          ? `<div class="user-info"><strong>${esc(S.user.email)}</strong>Administrateur</div>
               <button class="btn sm rd" id="logout-btn" style="width:100%">Déconnexion</button>`
          : `<button class="btn sm gr" id="login-btn" style="width:100%">Connexion admin</button>`}
        </div>
      </nav>
      <main class="main" id="main-content">
        ${buildView(sortedTeams, pts, wins, played)}
      </main>
    </div>`;
      attachMain();
    }

    function ni(view, icon, label) {
      const active = S.view === view
        || (S.view === 'team-detail' && S.prevView === view)
        || (S.view === 'tournament-detail' && S.prevView === view);
      return `<div class="nav-item ${active ? 'active' : ''}" data-nav="${view}"><span class="icon">${icon}</span>${label}</div>`;
    }

    function buildView(sortedTeams, pts, wins, played) {
      switch (S.view) {
        case 'home': return buildHome(sortedTeams, pts);
        case 'teams': return buildTeamsList(sortedTeams, pts);
        case 'team-detail': return buildTeamDetail(pts, wins, played);
        case 'players': return buildPlayersPage();
        case 'ranking-teams': return buildRankingTeams(sortedTeams, pts, wins, played);
        case 'ranking-players': return buildRankingPlayers();
        case 'tournaments': return buildTournaments();
        case 'tournament-detail': return buildTournamentDetail(pts);
        case 'admin': return buildAdmin();
        default: return '';
      }
    }

    // ── Home ──────────────────────────────────────────────
    function buildHome(sortedTeams, pts) {
      const done = S.tournaments.filter(t => t.status === 'done').length;
      const live = S.tournaments.find(t => t.status === 'live');
      const topPlayer = S.players[0];
      return `
    <div class="page-title">Bienvenue</div>
    <div class="page-sub">Suivi des tournois Geometry Dash — Saison 1</div>
    <div class="summary">
      <div class="sum-card"><div class="sum-val" style="color:var(--or)">${done}/${S.tournaments.length}</div><div class="sum-lbl">TOURNOIS</div></div>
      <div class="sum-card"><div class="sum-val" style="color:var(--yl)">${pts[sortedTeams[0]?.id] || 0}</div><div class="sum-lbl">LEADER ÉQ.</div></div>
      <div class="sum-card"><div class="sum-val" style="color:var(--gr)">${S.teams.length}</div><div class="sum-lbl">ÉQUIPES</div></div>
      <div class="sum-card"><div class="sum-val" style="color:var(--pu)">${S.players.length}</div><div class="sum-lbl">JOUEURS</div></div>
    </div>
    ${live ? `<div class="section"><div class="stitle">EN COURS</div>
      <div class="t-card major" data-detail="${live.id}">
        <div class="t-type"><div class="t-type-dot" style="background:var(--or)"></div><span style="color:var(--or)">TOURNOI MAJEUR</span></div>
        <div class="t-name">${esc(live.name)}</div>
        <div class="t-date">${esc(live.date)}</div>
        <div class="t-footer"><span class="status live"><span class="live-dot"></span>EN DIRECT</span><span class="t-pts-badge">MAX ${live.max_pts} PTS</span></div>
      </div></div>` : ''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="section">
        <div class="stitle">TOP ÉQUIPES</div>
        <div class="card">
          <table class="lb-table">
            <thead><tr><th>#</th><th>Équipe</th><th class="r">Pts</th></tr></thead>
            <tbody>${sortedTeams.slice(0, 5).map((t, i) => `<tr class="clickable" data-team-detail="${t.id}">
              <td><span class="rank ${['r1', 'r2', 'r3'][i] || ''}">${i + 1}</span></td>
              <td><div class="team-cell">${flagHtml(t.flag, 'flag-sm')}<div class="team-dot" style="background:${esc(t.color)}"></div>${esc(t.name)}</div></td>
              <td class="pts-cell r">${pts[t.id] || 0}</td>
            </tr>`).join('')}</tbody>
          </table>
        </div>
      </div>
      <div class="section">
        <div class="stitle">TOP JOUEURS</div>
        <div class="card">
          <table class="lb-table">
            <thead><tr><th>#</th><th>Joueur</th><th class="r">Pts</th></tr></thead>
            <tbody>${S.players.slice(0, 5).map((p, i) => {
        const team = teamById(p.team_id); return `<tr>
              <td><span class="rank ${['r1', 'r2', 'r3'][i] || ''}">${i + 1}</span></td>
              <td><div class="team-cell">${flagHtml(p.flag, 'flag-sm')}${esc(p.name)}${team ? `<div class="team-dot" style="background:${esc(team.color)}"></div>` : ''}${roleBadge(p.role)}</div></td>
              <td class="pts-cell r">${p.pts}</td>
            </tr>`;
      }).join('')}</tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="stitle">PROCHAINS TOURNOIS</div>
      <div class="t-grid">${S.tournaments.filter(t => t.status === 'soon').map(t => buildTCard(t)).join('') || `<p style="color:var(--mu);font-size:13px">Aucun tournoi prévu.</p>`}</div>
    </div>`;
    }

    // ── Teams list ────────────────────────────────────────
    function buildTeamsList(sortedTeams, pts) {
      return `
    <div class="page-title">Équipes</div>
    <div class="page-sub">Clique sur une équipe pour voir ses joueurs</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${sortedTeams.map(t => {
        const members = playersOf(t.id);
        const captain = members.find(p => p.role === 'captain');
        return `<div class="t-card" data-team-detail="${t.id}" style="border-color:${t.color}22">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
            <div style="font-size:32px;width:44px;text-align:center">${flagHtml(t.flag, 'flag')}</div>
            <div>
              <div style="font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:${esc(t.color)}">${esc(t.name)}</div>
              ${captain ? `<div style="font-size:11px;color:var(--mu2);margin-top:2px">Cap. ${esc(captain.name)}</div>` : ''}
            </div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <span style="font-size:12px;color:var(--mu2)">${members.length} joueur${members.length !== 1 ? 's' : ''}</span>
            <span style="font-family:'Orbitron',monospace;font-size:11px;color:${esc(t.color)};margin-left:auto">${pts[t.id] || 0} pts</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
    }

    // ── Team detail ───────────────────────────────────────
    function buildTeamDetail(pts, wins, played) {
      const t = S.teams.find(x => x.id === S.teamDetailId);
      if (!t) return '<p style="color:var(--mu)">Équipe introuvable.</p>';
      const members = playersOf(t.id);
      const sorted = [...members].sort((a, b) => {
        const ro = { captain: 0, coach: 1, player: 2 };
        return (ro[a.role] || 2) - (ro[b.role] || 2) || b.pts - a.pts;
      });

      return `
    <button class="back" id="back-btn">← Retour</button>
    <div style="height:14px"></div>
    <div class="team-hero">
      <div class="team-hero-flag">${flagHtml(t.flag, 'flag')}</div>
      <div class="team-hero-info">
        <div class="team-hero-name" style="color:${esc(t.color)}">${esc(t.name)}</div>
        ${t.description ? `<div class="team-hero-desc">${esc(t.description)}</div>` : ''}
        <div class="team-hero-pts">${pts[t.id] || 0} pts saison · ${wins[t.id] || 0} victoires</div>
      </div>
    </div>
    <div class="stitle">ROSTER</div>
    <div class="card">
      ${sorted.length === 0
          ? `<div style="padding:20px;color:var(--mu);font-size:13px;text-align:center">Aucun joueur dans cette équipe.</div>`
          : sorted.map((p, i) => `<div class="player-row">
            <span style="font-family:'Orbitron',monospace;font-size:10px;color:var(--mu);min-width:20px">${i + 1}</span>
            ${flagHtml(p.flag, 'flag')}
            <span class="player-name">${esc(p.name)}</span>
            ${roleBadge(p.role)}
            <span style="font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--or)">${p.pts} pts</span>
          </div>`).join('')}
    </div>

    <div style="height:20px"></div>
    <div class="stitle">TOURNOIS JOUÉS</div>
    <div class="card">
      ${S.matches.filter(m => m.team1_id === t.id || m.team2_id === t.id).length === 0
          ? `<div style="padding:16px;color:var(--mu);font-size:13px">Aucun match.</div>`
          : (() => {
            const tourIds = [...new Set(S.matches.filter(m => m.team1_id === t.id || m.team2_id === t.id).map(m => m.tournament_id))];
            return tourIds.map(tid => {
              const tour = S.tournaments.find(x => x.id === tid);
              if (!tour) return '';
              const ms = matchesFor(tid).filter(m => m.team1_id === t.id || m.team2_id === t.id);
              const w = ms.filter(m => m.winner_id === t.id).length;
              return `<div class="admin-row">
                <span class="n">${esc(tour.name)}</span>
                <span style="font-size:11px;color:var(--mu2)">${ms.length} match${ms.length !== 1 ? 's' : ''} · ${w}V</span>
                <span class="status ${esc(tour.status)}" style="font-size:9px">${tour.status === 'done' ? 'Terminé' : tour.status === 'live' ? 'Live' : 'À venir'}</span>
              </div>`;
            }).join('');
          })()}
    </div>`;
    }

    // ── Players page ──────────────────────────────────────
    function buildPlayersPage() {
      const sorted = [...S.players].sort((a, b) => b.pts - a.pts);
      return `
    <div class="page-title">Joueurs</div>
    <div class="page-sub">Tous les joueurs inscrits en Saison 1</div>
    <div class="card">
      <table class="lb-table">
        <thead><tr><th>#</th><th>Joueur</th><th>Équipe</th><th>Rôle</th><th class="r">Pts</th></tr></thead>
        <tbody>${sorted.map((p, i) => {
        const team = teamById(p.team_id); return `<tr>
          <td><span class="rank ${['r1', 'r2', 'r3'][i] || ''}">${i + 1}</span></td>
          <td><div class="team-cell">${flagHtml(p.flag, 'flag-sm')}<span style="font-weight:600">${esc(p.name)}</span></div></td>
          <td>${team ? `<div class="team-cell"><div class="team-dot" style="background:${esc(team.color)}"></div>${esc(team.name)}</div>` : '<span style="color:var(--mu)">—</span>'}</td>
          <td>${roleBadge(p.role)}</td>
          <td class="pts-cell r">${p.pts}</td>
        </tr>`;
      }).join('')}</tbody>
      </table>
    </div>`;
    }

    // ── Ranking teams ─────────────────────────────────────
    function buildRankingTeams(sortedTeams, pts, wins, played) {
      return `
    <div class="page-title">Classement Équipes</div>
    <div class="page-sub">Points cumulés sur tous les tournois — Saison 1</div>
    <div class="section"><div class="card">
      <table class="lb-table">
        <thead><tr><th>#</th><th>Équipe</th><th class="r">Matchs</th><th class="r">Victoires</th><th class="r">Points</th></tr></thead>
        <tbody>${sortedTeams.map((t, i) => `<tr class="clickable" data-team-detail="${t.id}">
          <td><span class="rank ${['r1', 'r2', 'r3'][i] || ''}">${i + 1}</span></td>
          <td><div class="team-cell">${flagHtml(t.flag, 'flag-sm')}<div class="team-dot" style="background:${esc(t.color)}"></div>${esc(t.name)}</div></td>
          <td class="num-cell">${played[t.id] || 0}</td>
          <td class="num-cell">${wins[t.id] || 0}</td>
          <td class="pts-cell r">${pts[t.id] || 0}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div></div>
    <div class="section">
      <div class="stitle">DÉTAIL PAR TOURNOI</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${S.tournaments.filter(t => t.status !== 'soon').map(t => {
        const ms = matchesFor(t.id).filter(m => m.winner_id);
        const tPts = {};
        ms.forEach(m => { tPts[m.winner_id] = (tPts[m.winner_id] || 0) + m.pts_win; const l = m.winner_id === m.team1_id ? m.team2_id : m.team1_id; if (l) tPts[l] = (tPts[l] || 0) + m.pts_lose; });
        return `<div class="card"><div class="card-head">
            <span class="card-head-title">${esc(t.name)}</span>
            <span class="status ${esc(t.status)}" style="font-size:9px">${t.status === 'live' ? 'Live' : 'Terminé'}</span>
          </div><div style="padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap">
            ${Object.entries(tPts).length === 0 ? `<span style="font-size:12px;color:var(--mu)">Aucun résultat</span>` :
            Object.entries(tPts).sort((a, b) => b[1] - a[1]).map(([tid, p]) => {
              const team = teamById(+tid); if (!team) return '';
              return `<span style="font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid ${team.color}40;color:${team.color};background:${team.color}10">
                  <span style="font-family:'Orbitron',monospace;font-weight:700">${p}</span> ${esc(team.name)}</span>`;
            }).join('')}
          </div></div>`;
      }).join('') || `<p style="color:var(--mu);font-size:13px">Aucun tournoi terminé.</p>`}
      </div>
    </div>`;
    }

    // ── Ranking players ───────────────────────────────────
    function buildRankingPlayers() {
      const sorted = [...S.players].sort((a, b) => b.pts - a.pts);
      return `
    <div class="page-title">Classement Joueurs</div>
    <div class="page-sub">Points individuels — Saison 1</div>
    <div class="card">
      <table class="lb-table">
        <thead><tr><th>#</th><th>Joueur</th><th>Équipe</th><th>Rôle</th><th class="r">Points</th></tr></thead>
        <tbody>${sorted.map((p, i) => {
        const team = teamById(p.team_id);
        return `<tr>
            <td><span class="rank ${['r1', 'r2', 'r3'][i] || ''}">${i + 1}</span></td>
            <td><div class="team-cell">${flagHtml(p.flag, 'flag-sm')}<span style="font-weight:600">${esc(p.name)}</span></div></td>
            <td>${team ? `<div class="team-cell"><div class="team-dot" style="background:${esc(team.color)}"></div>${esc(team.name)}</div>` : '<span style="color:var(--mu)">—</span>'}</td>
            <td>${roleBadge(p.role)}</td>
            <td class="pts-cell r">${p.pts}</td>
          </tr>`;
      }).join('')}
        </tbody>
      </table>
    </div>`;
    }

    // ── Tournaments ───────────────────────────────────────
    function buildTournaments() {
      const major = S.tournaments.filter(t => t.type === 'major');
      const minor = S.tournaments.filter(t => t.type === 'minor');
      return `
    <div class="page-title">Tournois</div>
    <div class="page-sub">Tous les événements de la Saison 1</div>
    ${major.length ? `<div class="section"><div class="stitle">TOURNOIS MAJEURS</div><div class="t-grid">${major.map(t => buildTCard(t, true)).join('')}</div></div>` : ''}
    ${minor.length ? `<div class="section"><div class="stitle">HEBDOMADAIRES</div><div class="t-grid">${minor.map(t => buildTCard(t)).join('')}</div></div>` : ''}
    ${!major.length && !minor.length ? `<p style="color:var(--mu)">Aucun tournoi créé.</p>` : ''}`;
    }

    function buildTCard(t, forceMajor = false) {
      const isMajor = t.type === 'major' || forceMajor;
      const finale = matchesFor(t.id).find(m => m.round === 'Finale' && m.winner_id);
      const winTeam = finale ? teamById(finale.winner_id) : null;
      return `<div class="t-card ${isMajor ? 'major' : ''}" data-detail="${t.id}">
    <div class="t-type"><div class="t-type-dot" style="background:${isMajor ? 'var(--or)' : 'var(--mu2)'}"></div>
    <span style="color:${isMajor ? 'var(--or)' : 'var(--mu2)'}">${isMajor ? 'MAJEUR' : 'HEBDO'}</span></div>
    <div class="t-name">${esc(t.name)}</div>
    <div class="t-date">${esc(t.date)}</div>
    <div class="t-footer">
      <span class="status ${esc(t.status)}">${t.status === 'done' ? 'Terminé' : t.status === 'live' ? '<span class="live-dot"></span>EN DIRECT' : 'À venir'}</span>
      <span class="t-pts-badge">MAX ${t.max_pts} PTS</span>
    </div>
    ${winTeam ? `<div class="t-winner">Vainqueur : <strong>${esc(winTeam.name)}</strong></div>` : ''}
  </div>`;
    }

    // ── Bracket Tree ──────────────────────────────────────
    function buildBracketTree(matches, rounds) {
      // Sort rounds in tournament order (assuming rounds are named like "Round 1", "Quarter Finals", "Semi Finals", "Final")
      const roundOrder = ['Round 1', 'Round 2', 'Round 3', 'Round 4', 'Round 5', 'Round 6', 'Round 7', 'Round 8',
        'Round of 16', 'Quarter Finals', 'Quarter-Finals', 'Semi Finals', 'Semi-Finals', 'Final', 'Finale'];
      rounds.sort((a, b) => {
        const indexA = roundOrder.indexOf(a);
        const indexB = roundOrder.indexOf(b);
        if (indexA !== -1 && indexB !== -1) return indexA - indexB;
        return a.localeCompare(b);
      });

      return `<div class="bracket-tree">
        ${rounds.map((round, roundIndex) => {
        const roundMatches = matches.filter(m => m.round === round);
        // Sort matches within round for better visual layout
        roundMatches.sort((a, b) => (a.position || 0) - (b.position || 0));

        return `<div class="bracket-round">
            <div class="bracket-round-title">${esc(round)}</div>
            ${roundMatches.map((match, matchIndex) => {
          const ta = teamById(match.team1_id), tb = teamById(match.team2_id);
          if (!ta || !tb) {
            return `<div class="bracket-match">
                  <div class="bracket-team">
                    <div class="name">À déterminer</div>
                    <div class="score">—</div>
                  </div>
                  <div class="bracket-team">
                    <div class="name">À déterminer</div>
                    <div class="score">—</div>
                  </div>
                </div>`;
          }
          const aW = match.winner_id === ta.id, bW = match.winner_id === tb.id;
          return `<div class="bracket-match ${match.winner_id ? 'winner' : ''}">
                <div class="bracket-team ${!match.winner_id ? '' : aW ? 'winner' : 'loser'}">
                  <div class="name">
                    <div class="team-dot" style="background:${esc(ta.color)}"></div>
                    ${flagHtml(ta.flag, 'flag-sm')}${esc(ta.name)}
                  </div>
                  <div class="score">${match.score1 !== null ? match.score1 : '—'}</div>
                </div>
                <div class="bracket-team ${!match.winner_id ? '' : bW ? 'winner' : 'loser'}">
                  <div class="name">
                    <div class="team-dot" style="background:${esc(tb.color)}"></div>
                    ${flagHtml(tb.flag, 'flag-sm')}${esc(tb.name)}
                  </div>
                  <div class="score">${match.score2 !== null ? match.score2 : '—'}</div>
                </div>
              </div>`;
        }).join('')}
          </div>`;
      }).join('')}
      </div>`;
    }

    // ── Tournament detail ─────────────────────────────────
    function buildTournamentDetail(pts) {
      const t = S.tournaments.find(x => x.id === S.detailId);
      if (!t) return '<p style="color:var(--mu)">Introuvable.</p>';
      const ms = matchesFor(t.id);
      const rounds = [...new Set(ms.map(m => m.round))].sort();
      return `
    <div class="detail-hdr">
      <button class="back" id="back-btn">← Retour</button>
      <div>
        <div style="margin-bottom:6px"><span class="status ${esc(t.status)}">${t.status === 'done' ? 'Terminé' : t.status === 'live' ? '<span class="live-dot"></span>EN DIRECT' : 'À venir'}</span></div>
        <div class="detail-title">${esc(t.name)}</div>
        <div class="detail-meta">${esc(t.date)} · Max <span style="color:var(--yl);font-family:'Orbitron',monospace">${t.max_pts} pts</span></div>
      </div>
    </div>
    ${ms.length === 0
          ? `<div style="text-align:center;padding:60px;color:var(--mu)">Aucun match programmé.</div>`
          : `<div class="stitle">BRACKET</div>${buildBracketTree(ms, rounds)}`}`;
    }

    // ── Admin ─────────────────────────────────────────────
    function buildAdmin() {
      return `
    <div class="page-title">Administration</div>
    <div class="page-sub">Gestion des équipes, joueurs, tournois et matchs</div>

    <!-- Équipes -->
    <div class="section">
      <div class="stitle">ÉQUIPES</div>
      <div class="card" style="margin-bottom:10px">
        <div class="card-head"><span class="card-head-title">AJOUTER UNE ÉQUIPE</span></div>
        <div style="padding:14px 16px">
          <div class="form-grid">
            <div class="field"><label>NOM</label><input id="team-name" placeholder="Nova Squad"></div>
            <div class="field"><label>COULEUR</label><input id="team-color" type="color" value="#a855f7" style="height:38px;padding:2px"></div>
            <div class="field full"><label>DRAPEAU <small style="font-weight:400;color:var(--mu)">emoji (🇫🇷) ou URL image</small></label><input id="team-flag" placeholder="🇫🇷 ou https://..."><small>Emoji de pays, symbole personnalisé, ou lien vers une image PNG/JPG</small></div>
            <div class="field full"><label>DESCRIPTION</label><input id="team-desc" placeholder="Description courte..."></div>
          </div>
          <button class="btn gr" id="add-team-btn">+ Ajouter</button>
        </div>
      </div>
      <div class="card">
        ${S.teams.length === 0 ? `<div style="padding:16px;color:var(--mu);font-size:13px">Aucune équipe.</div>` :
          S.teams.map(t => `<div class="admin-row">
            ${flagHtml(t.flag, 'flag-sm')}
            <div class="team-dot" style="background:${esc(t.color)}"></div>
            <span class="n">${esc(t.name)}</span>
            <span style="font-size:11px;color:var(--mu2)">${playersOf(t.id).length} joueurs</span>
            <button class="btn sm rd" data-del-team="${t.id}">Suppr.</button>
          </div>`).join('')}
      </div>
    </div>

    <!-- Joueurs -->
    <div class="section">
      <div class="stitle">JOUEURS</div>
      <div class="card" style="margin-bottom:10px">
        <div class="card-head"><span class="card-head-title">AJOUTER UN JOUEUR</span></div>
        <div style="padding:14px 16px">
          <div class="form-grid">
            <div class="field"><label>PSEUDO</label><input id="p-name" placeholder="NovemberX"></div>
            <div class="field"><label>ÉQUIPE</label>
              <select id="p-team"><option value="">— Sans équipe —</option>${S.teams.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select>
            </div>
            <div class="field"><label>DRAPEAU <small style="font-weight:400;color:var(--mu)">emoji ou URL</small></label><input id="p-flag" placeholder="🇫🇷 ou https://..."></div>
            <div class="field"><label>RÔLE</label>
              <select id="p-role"><option value="player">Joueur</option><option value="captain">Captain</option><option value="coach">Coach</option></select>
            </div>
            <div class="field"><label>POINTS INITIAUX</label><input id="p-pts" type="number" value="0" placeholder="0"></div>
          </div>
          <button class="btn bl" id="add-player-btn">+ Ajouter joueur</button>
        </div>
      </div>
      <div class="card">
        ${S.players.length === 0 ? `<div style="padding:16px;color:var(--mu);font-size:13px">Aucun joueur.</div>` :
          S.players.map(p => {
            const team = teamById(p.team_id); return `<div class="admin-row">
            ${flagHtml(p.flag, 'flag-sm')}
            <span class="n">${esc(p.name)}</span>
            ${team ? `<span style="font-size:11px;color:${esc(team.color)}">${esc(team.name)}</span>` : ''}
            ${roleBadge(p.role)}
            <input type="number" value="${p.pts}" data-pts-player="${p.id}" style="background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:3px 8px;color:var(--tx);font-size:12px;width:70px;text-align:center">
            <button class="btn sm bl" data-save-pts="${p.id}">Pts</button>
            <button class="btn sm rd" data-del-player="${p.id}">Suppr.</button>
          </div>`;
          }).join('')}
      </div>
    </div>

    <!-- Tournois -->
    <div class="section">
      <div class="stitle">TOURNOIS</div>
      <div class="card" style="margin-bottom:10px">
        <div class="card-head"><span class="card-head-title">AJOUTER UN TOURNOI</span></div>
        <div style="padding:14px 16px">
          <div class="form-grid">
            <div class="field full"><label>NOM</label><input id="t-name" placeholder="Weekly Cup #1"></div>
            <div class="field"><label>TYPE</label><select id="t-type"><option value="minor">Hebdomadaire</option><option value="major">Majeur</option></select></div>
            <div class="field"><label>DATE</label><input id="t-date" placeholder="10 Avr 2025"></div>
            <div class="field"><label>STATUT</label><select id="t-status"><option value="soon">À venir</option><option value="live">En direct</option><option value="done">Terminé</option></select></div>
            <div class="field"><label>POINTS MAX</label><input id="t-pts" type="number" value="10"></div>
          </div>
          <button class="btn gr" id="add-tournament-btn">+ Ajouter</button>
        </div>
      </div>
      <div class="card">
        ${S.tournaments.length === 0 ? `<div style="padding:16px;color:var(--mu);font-size:13px">Aucun tournoi.</div>` :
          S.tournaments.map(t => `<div class="admin-row">
            <span class="n">${esc(t.name)}</span>
            <select data-status-t="${t.id}" style="background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:3px 7px;color:var(--tx);font-size:12px">
              <option value="soon" ${t.status === 'soon' ? 'selected' : ''}>À venir</option>
              <option value="live" ${t.status === 'live' ? 'selected' : ''}>Live</option>
              <option value="done" ${t.status === 'done' ? 'selected' : ''}>Terminé</option>
            </select>
            <button class="btn sm" data-save-status="${t.id}" style="border-color:var(--bl);color:var(--bl)">Sauver</button>
            <button class="btn sm rd" data-del-t="${t.id}">Suppr.</button>
          </div>`).join('')}
      </div>
    </div>

    <!-- Matchs -->
    <div class="section">
      <div class="stitle">MATCHS</div>
      <div class="card" style="margin-bottom:10px">
        <div class="card-head"><span class="card-head-title">AJOUTER UN MATCH</span></div>
        <div style="padding:14px 16px">
          <div class="form-grid">
            <div class="field full"><label>TOURNOI</label><select id="m-tournament">${S.tournaments.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select></div>
            <div class="field full"><label>ROUND</label><select id="m-round">
  <option value="Round 1">Round 1</option>
  <option value="Round 2">Round 2</option>
  <option value="Quarter Finals">Quarts</option>
  <option value="Semi Finals">Demi-finales</option>
  <option value="Final">Finale</option>
</select></div>
<div class="field">
  <label>POSITION (ordre)</label>
  <input id="m-pos" type="number" placeholder="1">
</div>
            <div class="field"><label>ÉQUIPE 1</label><select id="m-t1"><option value="">—</option>${S.teams.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select></div>
            <div class="field"><label>ÉQUIPE 2</label><select id="m-t2"><option value="">—</option>${S.teams.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select></div>
            <div class="field"><label>SCORE 1</label><input id="m-s1" type="number" placeholder="3"></div>
            <div class="field"><label>SCORE 2</label><input id="m-s2" type="number" placeholder="1"></div>
            <div class="field"><label>VAINQUEUR</label><select id="m-winner"><option value="">À jouer</option>${S.teams.map(t => `<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select></div>
            <div class="field"><label>PTS VICTOIRE</label><input id="m-ptw" type="number" value="10"></div>
            <div class="field"><label>PTS DÉFAITE</label><input id="m-ptl" type="number" value="4"></div>
          </div>
          <button class="btn bl" id="add-match-btn">+ Ajouter match</button>
        </div>
      </div>
      <div class="card">
        ${S.matches.length === 0 ? `<div style="padding:16px;color:var(--mu);font-size:13px">Aucun match.</div>` :
          S.matches.map(m => {
            const tour = S.tournaments.find(x => x.id === m.tournament_id); const ta = teamById(m.team1_id); const tb = teamById(m.team2_id);
            return `<div class="admin-row">
              <span class="n" style="font-size:12px">${esc(tour?.name || '?')} · ${esc(m.round)} · ${ta ? esc(ta.name) : '?'} vs ${tb ? esc(tb.name) : '?'}</span>
              <span style="font-family:'Orbitron',monospace;font-size:11px;color:var(--mu2)">${m.score1 !== null ? m.score1 : '—'}/${m.score2 !== null ? m.score2 : '—'}</span>
              <button class="btn sm rd" data-del-m="${m.id}">Suppr.</button>
            </div>`;
          }).join('')}
      </div>
    </div>
    <div id="admin-err"></div>`;
    }

    // ── Auth ──────────────────────────────────────────────
    function buildAuth() {
      return `<div class="auth-wrap"><div class="auth-box">
    <div class="auth-title">GD TOUR</div>
    <div class="auth-sub">Connexion administrateur</div>
    <div class="field" style="margin-bottom:10px"><label>EMAIL</label><input id="a-email" type="email" placeholder="admin@exemple.com"></div>
    <div class="field" style="margin-bottom:14px"><label>MOT DE PASSE</label><input id="a-pwd" type="password" placeholder="••••••••"></div>
    <div id="auth-err"></div>
    <button class="btn gr" id="a-submit" style="width:100%;margin-top:12px">Se connecter</button>
    <button class="btn sm" id="a-back" style="width:100%;margin-top:8px;border-color:var(--bd2);color:var(--mu2)">← Retour au site</button>
  </div></div>`;
    }

    // ── Events ────────────────────────────────────────────
    function attachMain() {
      // Nav
      document.querySelectorAll('[data-nav]').forEach(el => el.addEventListener('click', () => {
        S.view = el.dataset.nav; S.prevView = S.view; render();
      }));
      // Tournament detail
      document.querySelectorAll('[data-detail]').forEach(el => el.addEventListener('click', () => {
        S.detailId = +el.dataset.detail; S.prevView = S.view; S.view = 'tournament-detail'; render();
      }));
      // Team detail
      document.querySelectorAll('[data-team-detail]').forEach(el => el.addEventListener('click', () => {
        S.teamDetailId = +el.dataset.teamDetail; S.prevView = S.view; S.view = 'team-detail'; render();
      }));
      // Back
      document.getElementById('back-btn')?.addEventListener('click', () => { S.view = S.prevView || 'home'; render(); });

      // Auth
      document.getElementById('login-btn')?.addEventListener('click', () => { S.view = 'auth'; render(); });
      document.getElementById('logout-btn')?.addEventListener('click', async () => { await sb.auth.signOut(); S.user = null; S.view = 'home'; render(); });

      // Admin — équipes
      document.getElementById('add-team-btn')?.addEventListener('click', async () => {
        const name = (document.getElementById('team-name').value || '').trim();
        const color = document.getElementById('team-color').value;
        const flag = (document.getElementById('team-flag').value || '').trim();
        const description = (document.getElementById('team-desc').value || '').trim();
        if (!name) return;
        await sb.from('teams').insert({ name, color, flag, description });
        await loadData(); render();
      });
      document.querySelectorAll('[data-del-team]').forEach(el => el.addEventListener('click', async () => {
        await sb.from('teams').delete().eq('id', +el.dataset.delTeam); await loadData(); render();
      }));

      // Admin — joueurs
      document.getElementById('add-player-btn')?.addEventListener('click', async () => {
        const name = (document.getElementById('p-name').value || '').trim();
        const team_id = parseInt(document.getElementById('p-team').value) || null;
        const flag = (document.getElementById('p-flag').value || '').trim();
        const role = document.getElementById('p-role').value;
        const pts = parseInt(document.getElementById('p-pts').value) || 0;
        if (!name) return;
        await sb.from('players').insert({ name, team_id, flag, role, pts });
        await loadData(); render();
      });
      document.querySelectorAll('[data-save-pts]').forEach(el => el.addEventListener('click', async () => {
        const pid = +el.dataset.savePts;
        const inp = document.querySelector(`[data-pts-player="${pid}"]`);
        if (inp) { await sb.from('players').update({ pts: parseInt(inp.value) || 0 }).eq('id', pid); await loadData(); render(); }
      }));
      document.querySelectorAll('[data-del-player]').forEach(el => el.addEventListener('click', async () => {
        await sb.from('players').delete().eq('id', +el.dataset.delPlayer); await loadData(); render();
      }));

      // Admin — tournois
      document.getElementById('add-tournament-btn')?.addEventListener('click', async () => {
        const name = (document.getElementById('t-name').value || '').trim();
        const type = document.getElementById('t-type').value;
        const date = (document.getElementById('t-date').value || '').trim();
        const status = document.getElementById('t-status').value;
        const max_pts = parseInt(document.getElementById('t-pts').value) || 10;
        if (!name || !date) return;
        await sb.from('tournaments').insert({ name, type, date, status, max_pts });
        await loadData(); render();
      });
      document.querySelectorAll('[data-save-status]').forEach(el => el.addEventListener('click', async () => {
        const sel = document.querySelector(`[data-status-t="${el.dataset.saveStatus}"]`);
        if (sel) { await sb.from('tournaments').update({ status: sel.value }).eq('id', +el.dataset.saveStatus); await loadData(); render(); }
      }));
      document.querySelectorAll('[data-del-t]').forEach(el => el.addEventListener('click', async () => {
        await sb.from('tournaments').delete().eq('id', +el.dataset.delT); await loadData(); render();
      }));

      // Admin — matchs
      document.getElementById('add-match-btn')?.addEventListener('click', async () => {
        const tournament_id = parseInt(document.getElementById('m-tournament').value);
        const round = (document.getElementById('m-round').value || '').trim();
        const team1_id = parseInt(document.getElementById('m-t1').value) || null;
        const team2_id = parseInt(document.getElementById('m-t2').value) || null;
        const s1 = document.getElementById('m-s1').value;
        const s2 = document.getElementById('m-s2').value;
        const winner_id = parseInt(document.getElementById('m-winner').value) || null;
        const pts_win = parseInt(document.getElementById('m-ptw').value) || 10;
        const pts_lose = parseInt(document.getElementById('m-ptl').value) || 4;
        if (!round || !tournament_id) return;
        const position = parseInt(document.getElementById('m-pos').value) || 0;

        await sb.from('matches').insert({
          tournament_id,
          round,
          position,
          team1_id,
          team2_id,
          score1: s1 !== '' ? +s1 : null,
          score2: s2 !== '' ? +s2 : null,
          winner_id,
          pts_win,
          pts_lose
        });
        await loadData(); render();
      });
      document.querySelectorAll('[data-del-m]').forEach(el => el.addEventListener('click', async () => {
        await sb.from('matches').delete().eq('id', +el.dataset.delM); await loadData(); render();
      }));
    }

    function attachAuth() {
      document.getElementById('a-submit')?.addEventListener('click', async () => {
        const email = (document.getElementById('a-email').value || '').trim();
        const pwd = document.getElementById('a-pwd').value;
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
        if (error) { document.getElementById('auth-err').innerHTML = `<div class="err">${esc(error.message)}</div>`; return; }
        S.user = data.user; S.view = 'admin'; render();
      });
      document.getElementById('a-back')?.addEventListener('click', () => { S.view = 'home'; render(); });
    }

    init();
  </script>
</body>

</html>
